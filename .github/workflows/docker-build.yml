name: Docker Build and Push

on:
  # 添加手动触发，防止构建卡住反复删除 tag
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Login to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: musecr.azurecr.cn
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image for Next.js app
        uses: docker/build-push-action@v4
        timeout-minutes: 10
        with:
          context: .
          push: false
          load: true
          tags: musedam-website:local

      - name: Push Next.js app to Azure Container Registry
        run: |
          docker tag musedam-website:local musecr.azurecr.cn/muse/musedam-website:${{ env.VERSION }}
          docker tag musedam-website:local musecr.azurecr.cn/muse/musedam-website:latest
          docker push musecr.azurecr.cn/muse/musedam-website:${{ env.VERSION }}
          docker push musecr.azurecr.cn/muse/musedam-website:latest

      - name: Push Next.js app to GitHub Container Registry
        run: |
          docker tag musedam-website:local ghcr.io/${{ github.repository_owner }}/musedam-website:${{ env.VERSION }}
          docker tag musedam-website:local ghcr.io/${{ github.repository_owner }}/musedam-website:latest
          docker push ghcr.io/${{ github.repository_owner }}/musedam-website:${{ env.VERSION }}
          docker push ghcr.io/${{ github.repository_owner }}/musedam-website:latest

      - name: Build Docker image for Jobs
        uses: docker/build-push-action@v4
        timeout-minutes: 10
        with:
          context: .
          file: ./Dockerfile.job
          push: false
          load: true
          tags: musedam-website-job:local

      - name: Push Jobs to Azure Container Registry
        run: |
          docker tag musedam-website-job:local musecr.azurecr.cn/muse/musedam-website:${{ env.VERSION }}-job
          docker tag musedam-website-job:local musecr.azurecr.cn/muse/musedam-website:latest-job
          docker push musecr.azurecr.cn/muse/musedam-website:${{ env.VERSION }}-job
          docker push musecr.azurecr.cn/muse/musedam-website:latest-job

      - name: Push Jobs to GitHub Container Registry
        run: |
          docker tag musedam-website-job:local ghcr.io/${{ github.repository_owner }}/musedam-website:${{ env.VERSION }}-job
          docker tag musedam-website-job:local ghcr.io/${{ github.repository_owner }}/musedam-website:latest-job
          docker push ghcr.io/${{ github.repository_owner }}/musedam-website:${{ env.VERSION }}-job
          docker push ghcr.io/${{ github.repository_owner }}/musedam-website:latest-job

      - name: Setup Kubernetes Config And Update Deployment
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_MUSE_CLUSTER }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          export KUBECONFIG=$HOME/.kube/config
          kubectl config use-context muse-aws-cn-prod
          kubectl set image deployment/musedam-website musedam-website=musecr.azurecr.cn/muse/musedam-website:${{ env.VERSION }} --namespace musedam
          kubectl config use-context muse-aws-us-prod
          kubectl set image deployment/musedam-website musedam-website=musecr.azurecr.cn/muse/musedam-website:${{ env.VERSION }} --namespace musedam
